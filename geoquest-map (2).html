<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EDURUN — Online mapa</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --neon: #00ffe7;
    --neon2: #ff6b35;
    --neon3: #a855f7;
    --gold: #ffd700;
    --bg: #060d18;
    --panel: rgba(4,14,30,0.92);
    --border: rgba(0,255,231,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: #c8e8ff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.1rem;
    color: var(--neon);
    text-shadow: 0 0 14px var(--neon);
    letter-spacing: 3px;
  }

  .hud {
    display: flex;
    gap: 14px;
  }
  .hud-item { text-align: center; }
  .hud-label {
    font-size: 0.48rem;
    letter-spacing: 2px;
    color: rgba(200,232,255,0.4);
    text-transform: uppercase;
  }
  .hud-val {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1;
  }
  .hud-val.cyan  { color: var(--neon);  text-shadow: 0 0 8px var(--neon); }
  .hud-val.orange{ color: var(--neon2); text-shadow: 0 0 8px var(--neon2); }
  .hud-val.gold  { color: var(--gold);  text-shadow: 0 0 8px var(--gold); }

  /* ── MAP ── */
  #map {
    flex: 1;
    width: 100%;
    z-index: 0;
  }

  /* Dark map tiles filter */
  .leaflet-tile {
    filter: brightness(0.55) saturate(0.4) hue-rotate(185deg);
  }

  /* ── BOTTOM PANEL ── */
  .bottom {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
    flex-wrap: wrap;
    backdrop-filter: blur(10px);
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 14px;
    border: 1px solid var(--neon);
    background: transparent;
    color: var(--neon);
    cursor: pointer;
    text-transform: uppercase;
    flex: 1;
    min-width: 70px;
    transition: background 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active, .btn.active {
    background: rgba(0,255,231,0.12);
    box-shadow: 0 0 12px rgba(0,255,231,0.3);
  }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn.red { border-color: #ff4060; color: #ff4060; }
  .btn.red:active { background: rgba(255,64,96,0.12); }

  .status {
    font-size: 0.6rem;
    color: rgba(200,232,255,0.4);
    letter-spacing: 1px;
    flex-basis: 100%;
    text-align: center;
    padding-top: 2px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 68px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--panel);
    border: 1px solid var(--neon);
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 3px;
    padding: 9px 22px;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
    text-shadow: 0 0 10px var(--neon);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── END MODAL ── */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 9998;
    align-items: center;
    justify-content: center;
  }
  #modal.show { display: flex; }
  .modal-box {
    background: var(--panel);
    border: 1px solid var(--neon);
    box-shadow: 0 0 50px rgba(0,255,231,0.12);
    padding: 30px 28px;
    width: min(340px, 90vw);
    text-align: center;
  }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    color: var(--neon);
    text-shadow: 0 0 18px var(--neon);
    letter-spacing: 4px;
    margin-bottom: 22px;
  }
  .modal-stat {
    font-size: 0.8rem;
    letter-spacing: 2px;
    margin: 9px 0;
    color: rgba(200,232,255,0.75);
  }
  .modal-stat b {
    font-family: 'Orbitron', monospace;
    color: var(--neon);
    font-size: 1rem;
  }

  /* ── CUSTOM LEAFLET OVERRIDES ── */
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--neon) !important;
    border-color: var(--border) !important;
    font-family: 'Orbitron', monospace !important;
  }
  .leaflet-control-attribution {
    background: rgba(4,14,30,0.7) !important;
    color: rgba(200,232,255,0.3) !important;
    font-size: 0.5rem !important;
  }
  .leaflet-control-attribution a { color: rgba(0,255,231,0.4) !important; }
</style>
</head>
<body>

<header>
  <div class="logo">EDURUN</div>
  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">Skóre</div>
      <div class="hud-val cyan" id="hScore">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Body</div>
      <div class="hud-val orange" id="hOrbs">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Cesta</div>
      <div class="hud-val gold" id="hDist">0m</div>
    </div>
  </div>
</header>

<div id="map"></div>

<div class="bottom">
  <button class="btn" id="btnStart" onclick="startRun()">▶ Začít</button>
  <button class="btn" id="btnPause" onclick="togglePause()" disabled>⏸ Pozastavit</button>
  <button class="btn red" id="btnEnd" onclick="endRun()" disabled>■ Ukončit</button>
  <div class="status" id="status">Stiskni ZAČÍT — povolení k poloze</div>
</div>

<div id="toast"></div>

<div id="modal">
  <div class="modal-box">
    <div class="modal-title">MISE KOMPLETNÍ</div>
    <div class="modal-stat">Skóre — <b id="mScore">0</b></div>
    <div class="modal-stat">Získané body — <b id="mOrbs">0</b></div>
    <div class="modal-stat">Cesta — <b id="mDist">0m</b></div>
    <div class="modal-stat">Cesta trvala — <b id="mTime">0:00</b></div>
    <button class="btn" onclick="newGame()" style="width:100%;margin-top:18px">▶ Začít znovu</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  MAP SETUP
// ─────────────────────────────────────────
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true,
  tap: true
});

// ── START MARKER ──
const START_LAT = 49.9314, START_LNG = 17.9023;
const startIcon = L.divIcon({
  className: '',
  html: `<div style="
    width:32px;height:32px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff, #a855f7, #5b0fa8);
    box-shadow:0 0 20px 6px #a855f7, 0 0 6px #fff;
    border:2px solid rgba(168,85,247,0.8);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
  ">🏁</div>`,
  iconSize: [32, 32],
  iconAnchor: [16, 16]
});
const startMarker = L.marker([START_LAT, START_LNG], { icon: startIcon })
  .addTo(map)
  .bindPopup(`<b style="font-family:Orbitron,monospace;color:#a855f7">ZAČÍNAJÍCÍ BOD</b><br>Tyršova 34, Opava`, { className: '' });

// OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
  maxNativeZoom: 18
}).addTo(map);

map.setView([49.9314, 17.9023], 17); // Tyršova 34, Opava

// ─────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────
let G = {
  running: false,
  paused: false,
  score: 0,
  orbs: 0,
  dist: 0,
  startTime: null,
  watchId: null,
  lastPos: null,
  pathCoords: [],
  polyline: null,
  playerMarker: null,
  accuracyCircle: null,
  orbMarkers: [],
  orbData: [],
  animTick: 0,
  animId: null,
  centered: false
};

// ─────────────────────────────────────────
//  CUSTOM SVG ICONS
// ─────────────────────────────────────────
function playerIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:24px;height:24px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff, #00ffe7, #006655);
      box-shadow:0 0 18px 4px #00ffe7, 0 0 6px #00ffe7;
      border:2px solid rgba(0,255,231,0.6);
      position:relative;
    "></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
  });
}

function orbIcon(type) {
  const cfg = {
    gold:  { color:'#ffd700', glow:'#ffaa00', pts:50,  size:22 },
    bonus: { color:'#00ff88', glow:'#00cc66', pts:25,  size:18 },
    power: { color:'#ff6b35', glow:'#ff4400', pts:100, size:26 },
  }[type];
  return {
    ...cfg,
    icon: L.divIcon({
      className: '',
      html: `<div style="
        width:${cfg.size}px;height:${cfg.size}px;border-radius:50%;
        background:radial-gradient(circle at 35% 35%, #fff, ${cfg.color}, ${cfg.glow}88);
        box-shadow:0 0 14px 3px ${cfg.glow}, 0 0 5px ${cfg.color};
        border:1.5px solid ${cfg.color}99;
        display:flex;align-items:center;justify-content:center;
        font-family:'Orbitron',monospace;font-size:7px;font-weight:700;color:#fff;
        text-shadow:0 0 4px #000;
        animation: orbPulse 1.8s ease-in-out infinite;
      ">${cfg.pts}</div>`,
      iconSize: [cfg.size, cfg.size],
      iconAnchor: [cfg.size/2, cfg.size/2]
    })
  };
}

// Inject keyframe animation
const style = document.createElement('style');
style.textContent = `@keyframes orbPulse {
  0%,100%{transform:scale(1);filter:brightness(1)}
  50%{transform:scale(1.18);filter:brightness(1.3)}
}`;
document.head.appendChild(style);

// ─────────────────────────────────────────
//  START / GPS
// ─────────────────────────────────────────
function startRun() {
  if (!navigator.geolocation) {
    toast('ŽADNÁ GPS — zkuste na mobilu'); return;
  }
  setStatus('📡 Hledáme GPS signál...');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    initRun(lat, lng);
    G.watchId = navigator.geolocation.watchPosition(onGPS, onGPSErr,
      { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 });
  }, err => {
    setStatus('GPS nenalezena: ' + err.message);
    toast('GPS CHYBA — zamítnutý signál');
  }, { enableHighAccuracy: true, timeout: 12000 });
  setStatus('📡 Hledáme GPS signál...');
}

// fallback: centre on start point while waiting
setTimeout(() => {
  if (!G.running) map.setView([START_LAT, START_LNG], 17);
}, 500);

function onGPS(pos) {
  if (!G.running || G.paused) return;
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  const latlng = L.latLng(lat, lng);

  // Update player marker
  if (!G.playerMarker) {
    G.playerMarker = L.marker(latlng, { icon: playerIcon(), zIndexOffset: 1000 }).addTo(map);
  } else {
    G.playerMarker.setLatLng(latlng);
    G.playerMarker.setIcon(playerIcon());
  }

  // Accuracy circle
  if (G.accuracyCircle) map.removeLayer(G.accuracyCircle);
  G.accuracyCircle = L.circle(latlng, {
    radius: Math.min(accuracy, 50),
    color: '#00ffe7', fillColor: '#00ffe7',
    fillOpacity: 0.04, opacity: 0.2, weight: 1
  }).addTo(map);

  // Auto-follow
  map.setView(latlng, map.getZoom(), { animate: true, duration: 0.5 });

  // Distance
  if (G.lastPos) {
    G.dist += G.lastPos.distanceTo(latlng);
  }
  G.lastPos = latlng;

  // Path
  G.pathCoords.push(latlng);
  if (G.polyline) {
    G.polyline.setLatLngs(G.pathCoords);
  } else {
    G.polyline = L.polyline(G.pathCoords, {
      color: '#00ffe7', weight: 3.5, opacity: 0.75,
      dashArray: null
    }).addTo(map);
  }

  // Collect nearby orbs
  G.orbData.forEach((orb, i) => {
    if (orb.collected) return;
    if (latlng.distanceTo(L.latLng(orb.lat, orb.lng)) < orb.collectRadius) {
      collectOrb(i);
    }
  });

  setStatus(`GPS ±${Math.round(accuracy)}m · Walk to collect orbs!`);
  updateHUD();
}

function onGPSErr(e) { setStatus('⚠ GPS signal weak — keep moving'); }

// ─────────────────────────────────────────
//  INIT RUN
// ─────────────────────────────────────────
function initRun(lat, lng) {
  G.running = true;
  G.paused = false;
  G.startTime = Date.now();
  G.centered = true;

  map.setView([lat, lng], 17);

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnEnd').disabled = false;

  spawnOrbs(lat, lng, 14);
  toast('EDURUN začal — JDI!');
  setStatus('Posbíral jsi bod...');
}

// ─────────────────────────────────────────
//  ORBS
// ─────────────────────────────────────────
const ORB_TYPES = ['bonus','bonus','bonus','gold','gold','power'];

function spawnOrbs(centerLat, centerLng, count) {
  G.orbData = [];
  G.orbMarkers.forEach(m => map.removeLayer(m));
  G.orbMarkers = [];

  for (let i = 0; i < count; i++) {
    const type = ORB_TYPES[Math.floor(Math.random() * ORB_TYPES.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist  = 30 + Math.random() * 200; // 30–230m away
    const dlat  = (dist * Math.cos(angle)) / 111320;
    const dlng  = (dist * Math.sin(angle)) / (111320 * Math.cos(centerLat * Math.PI/180));
    const lat   = centerLat + dlat;
    const lng   = centerLng + dlng;

    const cfg = orbIcon(type);
    const marker = L.marker([lat, lng], { icon: cfg.icon }).addTo(map);
    G.orbData.push({ lat, lng, type, pts: cfg.pts, collected: false, collectRadius: 18 });
    G.orbMarkers.push(marker);
  }
}

function collectOrb(i) {
  const orb = G.orbData[i];
  orb.collected = true;
  map.removeLayer(G.orbMarkers[i]);

  // Collected flash marker
  const flash = L.circleMarker([orb.lat, orb.lng], {
    radius: 20, color: '#fff', fillColor: '#fff', fillOpacity: 0.6, weight: 2, opacity: 0.8
  }).addTo(map);
  setTimeout(() => map.removeLayer(flash), 400);

  G.score += orb.pts;
  G.orbs++;
  toast(`+${orb.pts} PTS!`);
  updateHUD();

  // Respawn new orb after 10s
  setTimeout(() => {
    if (!G.running) return;
    const center = G.lastPos || L.latLng(orb.lat, orb.lng);
    const angle = Math.random() * Math.PI * 2;
    const d = 30 + Math.random() * 200;
    const type = ORB_TYPES[Math.floor(Math.random() * ORB_TYPES.length)];
    const dlat = (d * Math.cos(angle)) / 111320;
    const dlng = (d * Math.sin(angle)) / (111320 * Math.cos(center.lat * Math.PI/180));
    const newLat = center.lat + dlat;
    const newLng = center.lng + dlng;
    const cfg = orbIcon(type);
    const marker = L.marker([newLat, newLng], { icon: cfg.icon }).addTo(map);
    G.orbData[i] = { lat: newLat, lng: newLng, type, pts: cfg.pts, collected: false, collectRadius: 18 };
    G.orbMarkers[i] = marker;
  }, 10000);
}

// ─────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────
function togglePause() {
  G.paused = !G.paused;
  document.getElementById('btnPause').textContent = G.paused ? '▶ RESUME' : '⏸ PAUSE';
  setStatus(G.paused ? 'PAUSED' : 'Collecting orbs...');
}

function endRun() {
  G.running = false;
  if (G.watchId) navigator.geolocation.clearWatch(G.watchId);
  const elapsed = Math.floor((Date.now() - G.startTime) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  document.getElementById('mScore').textContent = G.score;
  document.getElementById('mOrbs').textContent = G.orbs;
  document.getElementById('mDist').textContent = Math.round(G.dist) + 'm';
  document.getElementById('mTime').textContent = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('modal').classList.add('show');
}

function newGame() {
  document.getElementById('modal').classList.remove('show');
  // Clear map layers
  if (G.playerMarker) map.removeLayer(G.playerMarker);
  if (G.accuracyCircle) map.removeLayer(G.accuracyCircle);
  if (G.polyline) map.removeLayer(G.polyline);
  G.orbMarkers.forEach(m => map.removeLayer(m));

  G = {
    running: false, paused: false, score: 0, orbs: 0, dist: 0,
    startTime: null, watchId: null, lastPos: null, pathCoords: [],
    polyline: null, playerMarker: null, accuracyCircle: null,
    orbMarkers: [], orbData: [], animTick: 0, animId: null, centered: false
  };
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnEnd').disabled = true;
  document.getElementById('btnPause').textContent = '⏸ PAUSE';
  updateHUD();
  setStatus('Stiskni ZAČÍT — povolení k poloze');
}

// ─────────────────────────────────────────
//  HUD / UTILS
// ─────────────────────────────────────────
function updateHUD() {
  document.getElementById('hScore').textContent = G.score;
  document.getElementById('hOrbs').textContent = G.orbs;
  document.getElementById('hDist').textContent = G.dist >= 1000
    ? (G.dist/1000).toFixed(2) + 'km'
    : Math.round(G.dist) + 'm';
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1900);
}
</script>
</body>
</html>
